server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirige todas las rutas al index.html (necesario para React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy al backend para evitar problemas de CORS en producción
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

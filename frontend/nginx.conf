server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Evita que el navegador cachee index.html
    location /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Redirige todas las rutas al index.html (necesario para React Router)
    location / {
        try_files $uri $uri/ /index.html;
        # Si el archivo servido termina siendo index.html, añade cabeceras anti-caché
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Caché estática para assets de Vite con hash
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy al backend para evitar problemas de CORS en producción
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
